<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPass — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">Class<span>Pass</span></div>
  <div class="loading-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- Login Page -->
<div class="page-content login-page" style="display:none">
  <a href="../index.html" class="btn-back-home"><i class="bi bi-arrow-left"></i> Home</a>
  <div class="login-card">
    <div class="login-logo">ClassPass</div>
    <div class="login-subtitle">Sign in to your account</div>
    

    <div id="login-error" class="login-error"><i class="bi bi-exclamation-circle"></i> Invalid credentials.</div>

    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>
      </div>
      <button class="btn-login" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <div class="demo-accounts">
      <strong>Demo Accounts:</strong>
      <p>
        Student: <b>student</b> / student123<br>
        Professor: <b>professor</b> / professor123
      </p>
    </div>
  </div>
</div>

<script src="jquery/jquery.js"></script>
<script src="js/script.js"></script>
<script>
  initLoadingScreen();
</script>
</body>
</html>
