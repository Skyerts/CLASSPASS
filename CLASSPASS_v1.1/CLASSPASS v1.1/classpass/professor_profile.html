<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPass — Professor Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Top Banner -->
<div id="top-banner">
  <img src="logo.png" alt="PCC Logo" id="banner-logo">
  <span id="banner-text">Persons of Character and Competence</span>
</div>
<div class="dashboard" >
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sb-avatar"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="sidebar-name" id="sb-name">Dr. Greta Rosario</div>
          <div class="sidebar-role" id="sb-role">Professor</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-nav="home" href="professor_home.html"><i class="bi bi-house-fill"></i> Home</a>
      <a class="nav-item" data-nav="profile" href="professor_profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      <a class="nav-item" data-nav="myclass" href="professor_class.html"><i class="bi bi-journal-bookmark-fill"></i> My Class</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-title">My Profile</div>
    <div class="page-subtitle">View and manage your professor information.</div>

    <div class="card">
      <div class="profile-section">
        <div class="profile-avatar-col">
          <div class="profile-avatar-big" id="profile-avatar">
            <i class="bi bi-person-fill"></i>
            <div class="overlay"><i class="bi bi-camera-fill"></i></div>
          </div>
          <button class="btn-upload"><i class="bi bi-upload"></i> Upload Photo</button>
          

        </div>

        <div class="profile-info-col">
          <div class="info-row">
            <div class="info-group">
              <label>Full Name</label>
              <div class="value" id="prof-name">—</div>
            </div>
            <div class="info-group">
              <label>Professor ID</label>
              <div class="value" id="prof-id">—</div>
            </div>
          </div>
          <div class="info-row">
            <div class="info-group">
              <label>Email Address</label>
              <div class="value" id="prof-email">—</div>
            </div>
            <div class="info-group">
              <label>Phone Number</label>
              <div class="value" id="prof-phone">—</div>
            </div>
          </div>
          <div class="info-row">
            <div class="info-group">
              <label id="prof-extra1-label">Department</label>
              <div class="value" id="prof-extra1">—</div>
            </div>
            <div class="info-group">
              <label id="prof-extra2-label">Position</label>
              <div class="value" id="prof-extra2">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Classes summary -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-journal-bookmark-fill"></i>
        <div><h3>Classes Handled</h3><p>Subjects you are currently teaching</p></div>
      </div>
      <div id="classes-summary"></div>
    </div>
  </main>
</div>

<script src="jquery/jquery.js"></script>
<script src="js/script.js"></script>
<script>
  if (requireAuth('professor')) {
    setupSidebar('profile');
    renderProfile();

    const cont = document.getElementById('classes-summary');
    cont.innerHTML = PROFESSOR_CLASSES.map(c => `
      <div class="holiday-item">
        <div>
          <div class="holiday-name">${c.name}</div>
          <div class="holiday-date">${c.code} · ${c.section} · ${c.schedule}</div>
        </div>
        <div style="background:${c.color};width:12px;height:12px;border-radius:50%"></div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
