<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPass — My Requests</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard" >
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sb-avatar"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="sidebar-name" id="sb-name">Kurt Cortez</div>
          <div class="sidebar-role" id="sb-role">Student</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-nav="home" href="student_home.html"><i class="bi bi-house-fill"></i> Home</a>
      <a class="nav-item" data-nav="profile" href="student_profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      <a class="nav-item" data-nav="subjects" href="student_subjects.html"><i class="bi bi-book-fill"></i> Subjects</a>
      <a class="nav-item" data-nav="requests" href="student_requests.html"><i class="bi bi-file-earmark-text-fill"></i> Requests</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-title">My Requests</div>
    <div class="page-subtitle">Track the status of all your absence requests.</div>

    <div class="filter-row">
      <select class="filter-select" id="status-filter" onchange="renderRequests(this.value)">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="denied">Denied</option>
      </select>
      <div style="flex:1"></div>
      <a href="student_subjects.html" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:0.88rem">
        <i class="bi bi-plus-lg"></i> New Request
      </a>
    </div>

    <div class="requests-list" id="requests-list"></div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detail-modal')"><i class="bi bi-x-lg"></i></button>
    <div class="modal-title"><i class="bi bi-file-earmark-text" style="color:var(--red)"></i> Absence Request Details</div>
    <div class="detail-row"><div class="detail-label">Student</div><div class="detail-value" id="detail-student">—</div></div>
    <div class="detail-row"><div class="detail-label">Subject</div><div class="detail-value" id="detail-subject">—</div></div>
    <div class="detail-row"><div class="detail-label">Absence Date</div><div class="detail-value" id="detail-date">—</div></div>
    <div class="detail-row"><div class="detail-label">Filed On</div><div class="detail-value" id="detail-filed">—</div></div>
    <div class="detail-row"><div class="detail-label">Reason</div><div class="detail-value" id="detail-reason">—</div></div>
    <div class="detail-row"><div class="detail-label">Status</div><div id="detail-status">—</div></div>
    <div class="modal-actions" id="detail-actions">
      <button class="btn-primary" onclick="closeModal('detail-modal')">Close</button>
    </div>
  </div>
</div>

<script src="jquery/jquery.js"></script>
<script src="js/script.js"></script>
<script>
  if (requireAuth('student')) {
    setupSidebar('requests');
    renderRequests();
  }
</script>
</body>
</html>
