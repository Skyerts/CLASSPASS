<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPass — Subjects</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard" id="">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sb-avatar"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="sidebar-name" id="sb-name">Kurt</div>
          <div class="sidebar-role" id="sb-role">Student</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-nav="home" href="student_home.html"><i class="bi bi-house-fill"></i> Home</a>
      <a class="nav-item" data-nav="profile" href="student_profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      <a class="nav-item" data-nav="subjects" href="student_subjects.html"><i class="bi bi-book-fill"></i> Subjects</a>
      <a class="nav-item" data-nav="requests" href="student_requests.html"><i class="bi bi-file-earmark-text-fill"></i> Requests</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-title">My Subjects</div>
    <div class="page-subtitle">Select a subject to file an absence request.</div>

    <div class="subjects-grid" id="subjects-grid"></div>
  </main>
</div>

<!-- Absence Modal -->
<div class="modal-overlay" id="absence-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('absence-modal')"><i class="bi bi-x-lg"></i></button>
    <div class="modal-title"><i class="bi bi-file-earmark-plus" style="color:var(--red)"></i> File Absence Request</div>
    <input type="hidden" id="absence-subject-id">
    <input type="hidden" id="absence-subject-name">
    <div class="modal-form">
      <div class="form-group">
        <label>Subject</label>
        <div style="padding:10px 14px;background:#F5F5F5;border-radius:8px;font-weight:700;font-size:0.93rem" id="absence-subject-display">—</div>
      </div>
      <div class="form-group">
        <label>Absence Date</label>
        <input type="date" id="absence-date">
      </div>
      <div class="form-group">
        <label>Reason for Absence</label>
        <textarea id="absence-reason" placeholder="Describe your reason (e.g., medical appointment, family emergency...)"></textarea>
      </div>
    </div>
    <div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 14px;font-size:0.82rem;color:var(--text-mid);margin-bottom:4px">
      <i class="bi bi-info-circle" style="color:var(--red)"></i> Do not file absences on holidays. Your request will be sent to your professor for review.
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('absence-modal')">Cancel</button>
      <button class="btn-primary" onclick="submitAbsence()"><i class="bi bi-send-fill"></i> Submit Request</button>
    </div>
  </div>
</div>

<script src="jquery/jquery.js"></script>
<script src="js/script.js"></script>
<script>
  if (requireAuth('student')) {
    setupSidebar('subjects');
    renderSubjects();
  }
</script>
</body>
</html>
