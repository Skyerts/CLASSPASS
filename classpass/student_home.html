<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPass — Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Banner -->
<div id="top-banner">
  <img src="logo.png" alt="PCC Logo" id="banner-logo">
  <span id="banner-text">Persons of Character and Competence</span>
</div>

<div class="dashboard" >
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sb-avatar"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="sidebar-name" id="sb-name">Kurt Cortez</div>
          <div class="sidebar-role" id="sb-role">Student</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-nav="home" href="student_home.html"><i class="bi bi-house-fill"></i> Home</a>
      <a class="nav-item" data-nav="profile" href="student_profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      <a class="nav-item" data-nav="subjects" href="student_subjects.html"><i class="bi bi-book-fill"></i> Subjects</a>
      <a class="nav-item" data-nav="requests" href="student_requests.html"><i class="bi bi-file-earmark-text-fill"></i> Requests</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-title">Welcome Back! 👋</div>
    <div class="page-subtitle">Here's an overview of your academic activity.</div>

    <!-- Holidays Card -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-calendar-event-fill"></i>
        <div>
          <h3>Academic Holidays</h3>
          <p>Please avoid filing absence requests on these dates</p>
        </div>
      </div>
      <div id="holidays-list"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value red" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Approved</div>
        <div class="stat-value green" id="stat-approved">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value amber" id="stat-pending">—</div>
      </div>
    </div>
  </main>
</div>

<script src="jquery/jquery.js"></script>
<script src="js/script.js"></script>
<script>
  if (!requireAuth('student')) {}
  else {
    setupSidebar('home');
    renderHolidays();
    renderStudentStats();
  }
</script>
</body>
</html>
